<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OBS Camera Overlay (Auto Ratio Sync)</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
        .camera-container {
            position: absolute;
            top: 30px; left: 30px;
            width: 400px; 
            height: auto; 
            border: 4px solid #00ffcc;
            border-radius: 12px;
            box-shadow: 0 0 15px #00ffcc, inset 0 0 10px #00ffcc;
            overflow: hidden;
            background: transparent;
            transition: top 0.05s ease-out, left 0.05s ease-out, width 0.05s ease-out;
        }
        video { 
            width: 100%; 
            height: 100%; 
            display: block; 
            object-fit: cover; 
        }
        #status { position: absolute; top: 10px; left: 40px; color: #00ffcc; font-family: sans-serif; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtkK8QrsdAlT87VDZN4TNILGGYWyI5T6o",
            authDomain: "vor-solo.firebaseapp.com",
            databaseURL: "https://vor-solo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vor-solo",
            storageBucket: "vor-solo.firebasestorage.app",
            messagingSenderId: "856896766437",
            appId: "1:856896766437:web:3431fc6596d95aa0e8ef0c",
            measurementId: "G-0PYHWM5Y4P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const container = document.querySelector('.camera-container');
        
        const myConnectionId = Math.random().toString(36).substr(2, 9);
        const myStatusRef = ref(db, `stream/connections/${myConnectionId}`);

        let peerConnection;
        // StreamChamp အတွက် ICE Servers Configuration ကို ပိုမိုခိုင်မာအောင် ထားပေးခြင်း
        const configuration = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }], iceTransportPolicy: "all" };

        function initConnection() {
            set(myStatusRef, "waiting");

            if(peerConnection) {
                try { peerConnection.close(); } catch(e) {}
            }

            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    set(ref(db, `stream/signals/${myConnectionId}/candidate`), JSON.stringify(event.candidate));
                }
            };

            peerConnection.ontrack = event => {
                const videoEl = document.getElementById('remoteVideo');
                videoEl.srcObject = event.streams[0];
                document.getElementById('status').innerText = "🟢 LOCAL LIVE CONNECTED";
                
                // StreamChamp အတွက် အတင်းဆွဲဖွင့်ပေးမည့် Autoplay Force Trigger
                videoEl.play().catch(error => {
                    console.log("Autoplay prevented, trying to force play.");
                    videoEl.muted = true;
                    videoEl.play();
                });
            };

            peerConnection.oniceconnectionstatechange = () => {
                const state = peerConnection.iceConnectionState;
                if (state === "disconnected" || state === "failed") {
                    document.getElementById('status').innerText = "⏳ WAITING FOR PHONE TO RECONNECT...";
                }
            };
        }

        initConnection();

        onValue(myStatusRef, (snapshot) => {
            if (!snapshot.exists()) {
                document.getElementById('remoteVideo').srcObject = null;
                document.getElementById('status').innerText = "❌ KICKED / DISCONNECTED";
                initConnection(); 
            }
        });

        onValue(ref(db, 'stream/layout'), (snapshot) => {
            const layout = snapshot.val();
            if (layout && container) {
                container.style.top = layout.top;
                container.style.left = layout.left;
                container.style.width = layout.width;
                
                if (layout.ratio === "1:1") {
                    container.style.aspectRatio = "1/1";
                } else if (layout.ratio === "16:9") {
                    container.style.aspectRatio = "16/9";
                } else if (layout.ratio === "9:16") {
                    container.style.aspectRatio = "9/16";
                } else {
                    container.style.aspectRatio = "1/1"; 
                }
            }
        });

        onValue(ref(db, `stream/signals/${myConnectionId}/offer`), async (snapshot) => {
            const data = snapshot.val();
            if (data && peerConnection && peerConnection.signalingState !== "closed") {
                const offer = JSON.parse(data);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await set(ref(db, `stream/signals/${myConnectionId}/answer`), JSON.stringify({ type: 'answer', sdp: answer.sdp }));
            }
        });

        onValue(ref(db, `stream/signals/${myConnectionId}/candidate`), async (snapshot) => {
            const data = snapshot.val();
            if (data && peerConnection && peerConnection.signalingState !== "closed") {
                try {
                    const parsed = JSON.parse(data);
                    await peerConnection.addIceCandidate(new RTCIceCandidate(parsed));
                } catch(e) {}
            }
        });
    </script>
</head>
<body>
    <div id="status">🔴 WAITING FOR LOCAL PHONE...</div>
    <div class="camera-container">
        <!-- StreamChamp HTML View အတွက် လိုအပ်သော iOS Attributes များ အပြည့်အစုံထည့်ထားသည် -->
        <video id="remoteVideo" autoplay playsinline webkit-playsinline muted controlslist="nodownload"></video>
    </div>
</body>
</html>
