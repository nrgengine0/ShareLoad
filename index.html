<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OBS Camera Overlay (StreamChamp Secure Mode)</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
        .camera-container {
            position: absolute;
            top: 30px; left: 30px;
            width: 400px; 
            height: auto; 
            border: 4px solid #00ffcc;
            border-radius: 12px;
            box-shadow: 0 0 15px #00ffcc, inset 0 0 10px #00ffcc;
            overflow: hidden;
            background: #000;
            transition: top 0.05s ease-out, left 0.05s ease-out, width 0.05s ease-out;
        }
        /* Video tag အစား Img ကို ပြောင်းသုံးပြီး ကွက်တိဖြစ်အောင် ညှိခြင်း */
        img { 
            width: 100%; 
            height: 100%; 
            display: block; 
            object-fit: cover; 
        }
        #status { position: absolute; top: 10px; left: 40px; color: #00ffcc; font-family: sans-serif; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtkK8QrsdAlT87VDZN4TNILGGYWyI5T6o",
            authDomain: "vor-solo.firebaseapp.com",
            databaseURL: "https://vor-solo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vor-solo",
            storageBucket: "vor-solo.firebasestorage.app",
            messagingSenderId: "856896766437",
            appId: "1:856896766437:web:3431fc6596d95aa0e8ef0c",
            measurementId: "G-0PYHWM5Y4P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const container = document.querySelector('.camera-container');
        const remoteImg = document.getElementById('remoteImg');

        document.getElementById('status').innerText = "🟢 STREAMCHAMP SECURE MODE ACTIVE";

        // Firebase ထဲက ပုံရိပ် Data ကို တိုက်ရိုက်ဖတ်ပြီး img src ထဲ ထည့်ပေးခြင်း
        onValue(ref(db, 'stream/imageFrame'), (snapshot) => {
            const base64Data = snapshot.val();
            if (base64Data) {
                remoteImg.src = base64Data;
            }
        });

        // Layout နှင့် Aspect Ratio ကို လိုက်ညှိပေးခြင်း
        onValue(ref(db, 'stream/layout'), (snapshot) => {
            const layout = snapshot.val();
            if (layout && container) {
                container.style.top = layout.top;
                container.style.left = layout.left;
                container.style.width = layout.width;
                
                if (layout.ratio === "1:1") {
                    container.style.aspectRatio = "1/1";
                } else if (layout.ratio === "16:9") {
                    container.style.aspectRatio = "16/9";
                } else if (layout.ratio === "9:16") {
                    container.style.aspectRatio = "9/16";
                } else {
                    container.style.aspectRatio = "1/1"; 
                }
            }
        });
    </script>
</head>
<body>
    <div id="status">🔴 WAITING FOR PHONE FRAME...</div>
    <div class="camera-container">
        <!-- Browser Policy များကို ကျော်လွှားရန် <img> Tag ကို အသုံးပြုထားသည် -->
        <img id="remoteImg" src="" alt="Stream View">
    </div>
</body>
</html>
