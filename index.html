<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OBS Camera Overlay (Firebase)</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
        .camera-container {
            position: absolute;
            top: 30px; left: 30px;
            width: 400px; height: 225px;
            border: 4px solid #00ffcc;
            border-radius: 12px;
            box-shadow: 0 0 15px #00ffcc, inset 0 0 10px #00ffcc;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status { position: absolute; top: 10px; left: 40px; color: #00ffcc; font-family: sans-serif; font-size: 12px; font-weight: bold; }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, child, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtkK8QrsdAlT87VDZN4TNILGGYWyI5T6o",
            authDomain: "vor-solo.firebaseapp.com",
            databaseURL: "https://vor-solo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vor-solo",
            storageBucket: "vor-solo.firebasestorage.app",
            messagingSenderId: "856896766437",
            appId: "1:856896766437:web:3431fc6596d95aa0e8ef0c",
            measurementId: "G-0PYHWM5Y4P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const configuration = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun.services.mozilla.com' }
            ] 
        };

        const peerConnection = new RTCPeerConnection(configuration);

        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                const candidateRef = ref(db, `stream/candidates/${Math.random().toString(36).substr(2, 9)}`);
                set(candidateRef, JSON.stringify(event.candidate));
            }
        };

        // ဖုန်းဘက်မှ ဗီဒီယိုလမ်းကြောင်း ရောက်လာလျှင် ဗီဒီယို Tags ထဲ ထည့်ပြရန်
        peerConnection.ontrack = event => {
            const remoteVideo = document.getElementById('remoteVideo');
            if (remoteVideo.srcObject !== event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
                document.getElementById('status').innerText = "🟢 CONNECTED";
            }
        };

        // ဖုန်းဆီမှ Offer လာမည့်အလှည့်ကို စောင့်ကြည့်ခြင်း
        onValue(ref(db, 'stream/offer'), async (snapshot) => {
            const data = snapshot.val();
            if (data && peerConnection.signalingState === "stable") {
                const offer = JSON.parse(data);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                await set(ref(db, 'stream/answer'), JSON.stringify({ type: 'answer', sdp: answer.sdp }));
            }
        });

        // ဝင်လာသမျှ လမ်းကြောင်းတည်ဆောက်မှု (ICE Candidates) အားလုံးကို အချိန်နဲ့တပြေးညီ ချိတ်ဆက်ခြင်း
        onChildAdded(ref(db, 'stream/candidates'), async (snapshot) => {
            const data = snapshot.val();
            if (data) {
                try {
                    const candidate = JSON.parse(data);
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } catch(e) { console.error("Candidate Error", e); }
            }
        });
    </script>
</head>
<body>
    <div id="status">🔴 WAITING FOR PHONE...</div>
    <div class="camera-container">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
</body>
</html>
