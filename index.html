<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OBS Camera Overlay (Firebase)</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
        .camera-container {
            position: absolute;
            top: 30px; left: 30px;
            width: 400px; 
            aspect-ratio: 16/9;
            border: 4px solid #00ffcc;
            border-radius: 12px;
            box-shadow: 0 0 15px #00ffcc, inset 0 0 10px #00ffcc;
            overflow: hidden;
            background: #000;
            transition: top 0.05s ease-out, left 0.05s ease-out, width 0.05s ease-out; /* တုံ့ပြန်မှု မြန်ဆန် ချောမွေ့စေရန် */
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status { position: absolute; top: 10px; left: 40px; color: #00ffcc; font-family: sans-serif; font-size: 12px; font-weight: bold; }
    </style>
    
    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtkK8QrsdAlT87VDZN4TNILGGYWyI5T6o",
            authDomain: "vor-solo.firebaseapp.com",
            databaseURL: "https://vor-solo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vor-solo",
            storageBucket: "vor-solo.firebasestorage.app",
            messagingSenderId: "856896766437",
            appId: "1:856896766437:web:3431fc6596d95aa0e8ef0c",
            measurementId: "G-0PYHWM5Y4P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const container = document.querySelector('.camera-container');

        // --- 🎛️ ဖုန်းမှ ပို့လိုက်သော Layout များကို Real-time ဖတ်ပြီး CSS ပြောင်းလဲခြင်း ---
        onValue(ref(db, 'stream/layout'), (snapshot) => {
            const layout = snapshot.val();
            if (layout && container) {
                container.style.top = layout.top;
                container.style.left = layout.left;
                container.style.width = layout.width;
            }
        });

        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        const peerConnection = new RTCPeerConnection(configuration);

        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                set(ref(db, 'stream/candidate'), JSON.stringify(event.candidate));
            }
        };

        peerConnection.ontrack = event => {
            document.getElementById('remoteVideo').srcObject = event.streams[0];
            document.getElementById('status').innerText = "🟢 CONNECTED";
        };

        // အစောပိုင်းက အလုပ်လုပ်ခဲ့သည့် 'stream/signal' လမ်းကြောင်းအတိုင်း ပြန်လည်ပြင်ဆင်ထားပါသည်
        onValue(ref(db, 'stream/signal'), async (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const offer = JSON.parse(data);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                await set(ref(db, 'stream/answer'), JSON.stringify({ type: 'answer', sdp: answer.sdp }));
            }
        });

        onValue(ref(db, 'stream/candidate'), async (snapshot) => {
            const data = snapshot.val();
            if (data) {
                try {
                    const candidate = JSON.parse(data);
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } catch(e) {}
            }
        });
    </script>
</head>
<body>
    <div id="status">🔴 WAITING FOR PHONE...</div>
    <div class="camera-container">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
</body>
</html>
